- id: SPEC-TLS-009
  name: require-https-server
  description: Server URL 'http://localhost:8080' uses HTTP instead of HTTPS
  type: regex
  pattern: http://localhost:8080
  severity: high
  file_glob: '**/*.{py,js,ts,jsx,tsx,java,go,rs,rb,cs,php,kt}'
  standard: 'OpenAPI: VitalSync Medical API'
  clause: servers
  compliance_category: code
  remediation_guidance: Change the server URL to use HTTPS. Never use plain HTTP for
    API traffic.
  tags:
  - spec-import
  - openapi
  - tls
