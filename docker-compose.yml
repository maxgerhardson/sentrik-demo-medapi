services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vitalsync
      POSTGRES_USER: vitalsync
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitalsync"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://vitalsync:${DB_PASSWORD:-changeme_in_production}@db:5432/vitalsync
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-changeme_in_production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
