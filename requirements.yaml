# =============================================================================
# VitalSync Medical API — Regulatory Requirements
# =============================================================================
# This file defines the compliance requirements for a patient vitals ingestion
# API used with wearable medical devices. The system is regulated under:
#   - IEC 62304 (Medical Device Software Lifecycle)
#   - HIPAA Security Rule (45 CFR Part 164)
#   - OWASP Top 10 2021 (Web Application Security)
#   - SOC2 Trust Services Criteria (Security & Availability)
#
# Each requirement traces to a specific regulatory clause and is verified
# through code review, automated testing, or architectural analysis.
# =============================================================================

requirements:

  # ---------------------------------------------------------------------------
  # IEC 62304 — Medical Device Software Lifecycle
  # ---------------------------------------------------------------------------

  - id: REQ-IEC-001
    title: "Software development planning"
    description: >
      All software development activities shall be planned and documented.
      A software development plan shall define the processes, tools, and
      methods used for development, verification, and risk management.
    standard: "IEC 62304"
    clause: "5.1"
    status: active
    verification_method: code_review
    acceptance_criteria:
      - "Project has documented development plan (README, architecture docs)"
      - "CI/CD pipeline is defined and operational"

  - id: REQ-IEC-002
    title: "Software architecture documentation"
    description: >
      The software architecture shall be documented showing major components,
      their interfaces, and data flows. Module boundaries must be clearly
      defined to support independent verification.
    standard: "IEC 62304"
    clause: "5.3"
    status: active
    verification_method: architecture_review
    acceptance_criteria:
      - "Architecture document exists with component diagram"
      - "Module boundaries enforced via architecture rules"
      - "Data flow between components is documented"

  - id: REQ-IEC-003
    title: "Software unit verification"
    description: >
      Each software unit shall be verified against its specification.
      Unit tests shall cover critical paths, boundary conditions, and
      error handling scenarios.
    standard: "IEC 62304"
    clause: "5.5"
    status: active
    verification_method: automated_test
    acceptance_criteria:
      - "All public functions have unit tests"
      - "Tests cover success, failure, and edge cases"
      - "Test coverage tracked and reported"

  - id: REQ-IEC-004
    title: "Software integration and integration testing"
    description: >
      Software components shall be integrated according to the integration
      plan. Integration tests shall verify component interactions, especially
      at API boundaries and database interfaces.
    standard: "IEC 62304"
    clause: "5.6"
    status: active
    verification_method: automated_test
    acceptance_criteria:
      - "Integration tests exist for API endpoints"
      - "Database operations tested end-to-end"

  - id: REQ-IEC-005
    title: "Traceability between requirements and code"
    description: >
      A bidirectional traceability matrix shall be maintained linking each
      requirement to its implementing code and verifying tests.
    standard: "IEC 62304"
    clause: "5.7"
    status: active
    verification_method: traceability_analysis
    acceptance_criteria:
      - "Each requirement maps to specific source files"
      - "Traceability report generated by sentrik trace"

  - id: REQ-IEC-006
    title: "Risk management integration"
    description: >
      Software-related risks shall be identified, evaluated, and mitigated.
      Risk controls shall be implemented in code and verified through testing.
      Hazardous situations (data corruption, incorrect vital readings) must
      be addressed.
    standard: "IEC 62304"
    clause: "7.1"
    status: active
    verification_method: code_review
    acceptance_criteria:
      - "Input validation prevents corrupted vital readings"
      - "Alert thresholds verified against clinical ranges"
      - "Data integrity checks on all database operations"

  - id: REQ-IEC-007
    title: "Configuration management"
    description: >
      All software items shall be placed under configuration management.
      Changes shall be tracked, reviewed, and approved before release.
    standard: "IEC 62304"
    clause: "8.1"
    status: active
    verification_method: process_review
    acceptance_criteria:
      - "All code in version control (git)"
      - "Changes require PR review and gate approval"
      - "Release tags mark verified versions"

  - id: REQ-IEC-008
    title: "Problem resolution and defect tracking"
    description: >
      Software defects shall be reported, evaluated, and resolved.
      A defect tracking system shall be used to manage the lifecycle
      of all reported issues.
    standard: "IEC 62304"
    clause: "9.1"
    status: active
    verification_method: process_review
    acceptance_criteria:
      - "Defects tracked via GitHub Issues"
      - "Findings auto-reconciled to work items"
      - "Resolution verified by re-scan"

  # ---------------------------------------------------------------------------
  # HIPAA — Security Rule (45 CFR Part 164)
  # ---------------------------------------------------------------------------

  - id: REQ-HIPAA-001
    title: "PHI encryption at rest"
    description: >
      All electronic Protected Health Information (ePHI) must be encrypted
      at rest using AES-256 or equivalent NIST-approved algorithm. This
      includes patient records, vital signs data, and device metadata
      containing patient identifiers.
    standard: "HIPAA"
    clause: "164.312(a)(2)(iv)"
    status: active
    verification_method: code_review
    acceptance_criteria:
      - "All PHI columns encrypted before database storage"
      - "Encryption uses AES-256-GCM or equivalent"
      - "Encryption keys managed securely (not hardcoded)"

  - id: REQ-HIPAA-002
    title: "PHI encryption in transit"
    description: >
      All ePHI transmitted over networks must be encrypted using TLS 1.2+.
      API endpoints serving PHI must enforce HTTPS and reject plaintext
      connections.
    standard: "HIPAA"
    clause: "164.312(e)(1)"
    status: active
    verification_method: code_review
    acceptance_criteria:
      - "HTTPS enforced on all endpoints"
      - "HTTP requests redirected to HTTPS"
      - "TLS 1.2 minimum version enforced"

  - id: REQ-HIPAA-003
    title: "Access control and authentication"
    description: >
      Access to ePHI shall be restricted to authorized users. Each user
      must be uniquely identified and authenticated before accessing
      patient data. Role-based access control shall limit data exposure.
    standard: "HIPAA"
    clause: "164.312(a)(1)"
    status: active
    verification_method: code_review
    acceptance_criteria:
      - "JWT-based authentication on all PHI endpoints"
      - "Unique user identification in all requests"
      - "Role-based access control implemented"

  - id: REQ-HIPAA-004
    title: "Audit trail for PHI access"
    description: >
      All access to, creation, modification, and deletion of ePHI must
      be logged in a tamper-evident audit trail. Audit records must include
      who, what, when, and from where.
    standard: "HIPAA"
    clause: "164.312(b)"
    status: active
    verification_method: code_review
    acceptance_criteria:
      - "Audit middleware logs all PHI operations"
      - "Audit records include user, action, timestamp, IP"
      - "Audit log integrity protected by HMAC signatures"

  - id: REQ-HIPAA-005
    title: "Minimum necessary standard"
    description: >
      Systems shall limit PHI exposure to the minimum necessary for the
      intended purpose. API responses must not include unnecessary PHI
      fields. Logs must mask PHI data.
    standard: "HIPAA"
    clause: "164.502(b)"
    status: active
    verification_method: code_review
    acceptance_criteria:
      - "API responses use projection to limit PHI fields"
      - "Log output masks patient identifiers"
      - "PHI filtering applied before any external output"

  - id: REQ-HIPAA-006
    title: "Automatic session termination"
    description: >
      User sessions accessing ePHI must automatically terminate after
      a period of inactivity to prevent unauthorized access.
    standard: "HIPAA"
    clause: "164.312(a)(2)(iii)"
    status: active
    verification_method: code_review
    acceptance_criteria:
      - "JWT tokens have expiration time"
      - "Session timeout enforced (30 min default)"

  - id: REQ-HIPAA-007
    title: "Integrity controls"
    description: >
      Mechanisms shall be implemented to ensure ePHI is not improperly
      altered or destroyed. Data validation and integrity checks must
      be applied to all patient data operations.
    standard: "HIPAA"
    clause: "164.312(c)(1)"
    status: active
    verification_method: code_review
    acceptance_criteria:
      - "Input validation on all patient data fields"
      - "Database constraints enforce data integrity"
      - "Vital sign ranges validated against clinical bounds"

  - id: REQ-HIPAA-008
    title: "Contingency planning — data backup"
    description: >
      Procedures must exist to create and maintain retrievable exact
      copies of ePHI. Database backup strategy must be documented.
    standard: "HIPAA"
    clause: "164.308(a)(7)(ii)(A)"
    status: active
    verification_method: process_review
    acceptance_criteria:
      - "Database backup strategy documented"
      - "Backup encryption matches at-rest requirements"

  # ---------------------------------------------------------------------------
  # OWASP Top 10 2021 — Application Security
  # ---------------------------------------------------------------------------

  - id: REQ-OWASP-001
    title: "Input validation and injection prevention"
    description: >
      All user input must be validated, sanitized, and parameterized before
      use. SQL injection, command injection, and other injection attacks
      must be prevented through parameterized queries and input validation.
    standard: "OWASP"
    clause: "A03:2021 — Injection"
    status: active
    verification_method: code_review
    acceptance_criteria:
      - "All database queries use parameterized statements (ORM)"
      - "No string concatenation in SQL queries"
      - "No eval() or exec() on user input"
      - "Pydantic models validate all API input"

  - id: REQ-OWASP-002
    title: "Authentication and session management"
    description: >
      Strong authentication mechanisms must be implemented. Passwords
      must be hashed with bcrypt/argon2. Session tokens must be
      cryptographically random and expire appropriately.
    standard: "OWASP"
    clause: "A07:2021 — Identification and Authentication Failures"
    status: active
    verification_method: code_review
    acceptance_criteria:
      - "JWT-based authentication with secure signing"
      - "No hardcoded credentials in source code"
      - "Password hashing uses bcrypt or argon2"

  - id: REQ-OWASP-003
    title: "Sensitive data exposure prevention"
    description: >
      Sensitive data (credentials, API keys, PHI) must never be exposed
      in source code, logs, error messages, or API responses. Secrets
      must be managed via environment variables or vault.
    standard: "OWASP"
    clause: "A02:2021 — Cryptographic Failures"
    status: active
    verification_method: code_review
    acceptance_criteria:
      - "No hardcoded secrets in source code"
      - "Secrets loaded from environment variables"
      - "Error responses do not leak internal details"
      - "Secrets scanning in CI/CD pipeline"

  - id: REQ-OWASP-004
    title: "Broken access control prevention"
    description: >
      Access control must be enforced server-side. Users must only
      access resources they are authorized for. IDOR vulnerabilities
      must be prevented.
    standard: "OWASP"
    clause: "A01:2021 — Broken Access Control"
    status: active
    verification_method: code_review
    acceptance_criteria:
      - "Authorization checks on all endpoints"
      - "Users can only access their own patient data"
      - "Admin endpoints require elevated privileges"

  - id: REQ-OWASP-005
    title: "Security misconfiguration prevention"
    description: >
      Default credentials, unnecessary features, and verbose error
      messages must be disabled in production. Security headers must
      be set on all responses.
    standard: "OWASP"
    clause: "A05:2021 — Security Misconfiguration"
    status: active
    verification_method: code_review
    acceptance_criteria:
      - "No default passwords or demo accounts"
      - "Debug mode disabled in production"
      - "Security headers (CORS, CSP, HSTS) configured"

  - id: REQ-OWASP-006
    title: "Rate limiting and DoS protection"
    description: >
      API endpoints must implement rate limiting to prevent abuse
      and denial-of-service attacks. Critical endpoints (auth, data
      ingestion) must have stricter limits.
    standard: "OWASP"
    clause: "A04:2021 — Insecure Design"
    status: active
    verification_method: code_review
    acceptance_criteria:
      - "Rate limiting middleware on all API routes"
      - "Auth endpoints have stricter rate limits"
      - "429 responses with Retry-After header"

  - id: REQ-OWASP-007
    title: "Dependency vulnerability management"
    description: >
      All third-party dependencies must be tracked and monitored for
      known vulnerabilities. Vulnerable dependencies must be updated
      within defined SLA windows.
    standard: "OWASP"
    clause: "A06:2021 — Vulnerable and Outdated Components"
    status: active
    verification_method: automated_scan
    acceptance_criteria:
      - "SBOM generated for all dependencies"
      - "CVE scanning in CI/CD pipeline"
      - "No critical/high CVEs in production dependencies"

  - id: REQ-OWASP-008
    title: "Security logging and monitoring"
    description: >
      Security-relevant events must be logged and monitored. Failed
      authentication attempts, access control failures, and input
      validation failures must generate alerts.
    standard: "OWASP"
    clause: "A09:2021 — Security Logging and Monitoring Failures"
    status: active
    verification_method: code_review
    acceptance_criteria:
      - "Failed auth attempts logged with source IP"
      - "Access control violations logged"
      - "Input validation failures logged"
      - "Logs do not contain sensitive data"

  # ---------------------------------------------------------------------------
  # SOC2 — Trust Services Criteria
  # ---------------------------------------------------------------------------

  - id: REQ-SOC2-001
    title: "Audit logging and accountability"
    description: >
      All system actions must be logged in a tamper-evident audit trail.
      Logs must capture sufficient detail to reconstruct events and
      attribute actions to specific users or processes.
    standard: "SOC2"
    clause: "CC7.2 — System Operations"
    status: active
    verification_method: code_review
    acceptance_criteria:
      - "Structured JSON audit log for all operations"
      - "HMAC integrity signatures on log entries"
      - "Log includes timestamp, actor, action, resource, outcome"

  - id: REQ-SOC2-002
    title: "Change management controls"
    description: >
      All changes to the system must follow a defined change management
      process including review, testing, and approval before deployment.
    standard: "SOC2"
    clause: "CC8.1 — Change Management"
    status: active
    verification_method: process_review
    acceptance_criteria:
      - "All changes require PR review"
      - "Automated compliance gate on every PR"
      - "Gate must pass before merge is allowed"

  - id: REQ-SOC2-003
    title: "Logical access controls"
    description: >
      Access to system components must be restricted based on the
      principle of least privilege. Authentication and authorization
      must be enforced at all system boundaries.
    standard: "SOC2"
    clause: "CC6.1 — Logical and Physical Access Controls"
    status: active
    verification_method: code_review
    acceptance_criteria:
      - "API authentication required for all data endpoints"
      - "Database access restricted to application service account"
      - "No public access to admin functions"

  - id: REQ-SOC2-004
    title: "System monitoring and alerting"
    description: >
      System health, performance, and security metrics must be monitored.
      Anomalous conditions must trigger alerts for investigation.
    standard: "SOC2"
    clause: "CC7.1 — System Operations"
    status: active
    verification_method: code_review
    acceptance_criteria:
      - "Health check endpoint available"
      - "Application metrics tracked (response times, error rates)"
      - "Scan metrics tracked over time"

  - id: REQ-SOC2-005
    title: "Incident response procedures"
    description: >
      Procedures must exist for identifying, reporting, and responding
      to security incidents. Findings from security scans must be
      triaged and remediated within defined timelines.
    standard: "SOC2"
    clause: "CC7.3 — System Operations"
    status: active
    verification_method: process_review
    acceptance_criteria:
      - "Security findings auto-created as work items"
      - "Critical findings addressed within 24 hours"
      - "Finding resolution tracked and auditable"

  - id: REQ-SOC2-006
    title: "Vendor and dependency risk management"
    description: >
      Third-party dependencies must be inventoried, assessed for risk,
      and monitored for vulnerabilities. License compliance must be
      maintained for all dependencies.
    standard: "SOC2"
    clause: "CC9.2 — Risk Mitigation"
    status: active
    verification_method: automated_scan
    acceptance_criteria:
      - "Software Bill of Materials (SBOM) maintained"
      - "Dependency licenses audited for compliance"
      - "CVE monitoring active for all dependencies"
